{% extends "base.html" %}

{% block content %}

<form method="POST">
    {% csrf_token %}
    

    

    <h2 class="text-2xl font-semibold mb-6">
        Quiz for {{ quiz.note.title }}
    </h2>

    {% for q in questions %}

    <div class="bg-[#FFF8EE] border border-[#E8DED0] rounded-xl p-5 mb-4">

        <!-- Question -->
        <p class="font-medium mb-3">
            {{ forloop.counter }}. {{ q.question_text }}
        </p>

        <!-- Options -->
        <div class="space-y-2 text-sm">

            <p>
                 <input type="radio" name="q{{ q.id }}" value="A">
                 A) {{ q.option_a }}
            </p>

            <p>
                <input type="radio" name="q{{ q.id }}" value="B">
                B) {{ q.option_b }}
            </p>

            <p>
                <input type="radio" name="q{{ q.id }}" value="C">
                C) {{ q.option_c }}
            </p>

            <p>
                <input type="radio" name="q{{ q.id }}" value="D">
                D) {{ q.option_d }}
            </p>
        </div>

        

    </div>

    

    {% endfor %}

    <button type="submit" class="mt-4 bg-[#8B5E3C] text-white px-4 py-2 rounded-lg">
            Submit Quiz
    </button>
</form>

{% endblock %}
